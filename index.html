const b64 = s => Uint8Array.from(atob(s), c => c.charCodeAt(0));
async function unlock(pw) {
  const enc = new TextEncoder();
  const km = await crypto.subtle.importKey('raw', enc.encode(pw), 'PBKDF2', false, ['deriveKey']);
  const key = await crypto.subtle.deriveKey(
    {name:'PBKDF2', salt:b64(ENC.salt), iterations:ENC.iter, hash:'SHA-256'},
    km, {name:'AES-GCM', length:256}, false, ['decrypt']);
  const pt = await crypto.subtle.decrypt({name:'AES-GCM', iv:b64(ENC.iv)}, key, b64(ENC.ct));
  return new TextDecoder().decode(pt);
}
async function attempt(pw, remember) {
  const err = document.getElementById('err'); err.textContent = '';
  try {
    const html = await unlock(pw);
    if (remember) sessionStorage.setItem('rl_pw', pw);
    document.open(); document.write(html); document.close();
  } catch (e) {
    sessionStorage.removeItem('rl_pw');
    err.textContent = 'Wrong password.';
  }
}
document.getElementById('go').onclick = () =>
  attempt(document.getElementById('pw').value, true);
document.getElementById('pw').addEventListener('keydown', e => {
  if (e.key === 'Enter') attempt(e.target.value, true);
});
const saved = sessionStorage.getItem('rl_pw');
if (saved) attempt(saved, false);  // auto-unlock within the same session
